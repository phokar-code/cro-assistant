name: Weekly CRO Audit — pepstores.com

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (09:00 SAST)
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Clone private data repo (handles empty repo on first run)
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${{ secrets.DATA_REPO }}.git cro-data
          # If repo was empty, create the main branch so we can push later
          cd cro-data
          git checkout -b main 2>/dev/null || true
          cd ..

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore state from data repo
        run: |
          mkdir -p state
          cp cro-data/state/feedback.json state/feedback.json 2>/dev/null || echo '{}' > state/feedback.json
          cp cro-data/state/history.json  state/history.json  2>/dev/null || true
          cp cro-data/state/baseline.json state/baseline.json 2>/dev/null || true

      - name: Run CRO audit
        run: python main.py audit --no-ai
        env:
          PYTHONUNBUFFERED: '1'

      - name: Push results to data repo
        run: |
          mkdir -p cro-data/state
          # Only copy files that exist — audit may have aborted due to rate limiting
          [ -f report.html           ] && cp report.html           cro-data/report.html           || true
          [ -f ROADMAP.md            ] && cp ROADMAP.md            cro-data/ROADMAP.md            || true
          [ -f state/baseline.json   ] && cp state/baseline.json   cro-data/state/baseline.json   || true
          [ -f state/history.json    ] && cp state/history.json    cro-data/state/history.json    || true
          [ -f state/last_audit.json ] && cp state/last_audit.json cro-data/state/last_audit.json || true
          # feedback.json is only written by the Streamlit app — CI never overwrites it
          [ -f cro-data/state/feedback.json ] || echo '{}' > cro-data/state/feedback.json

          cd cro-data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "audit: $(date -u +%Y-%m-%d)"
          git push --set-upstream origin main

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cro-report-${{ github.run_number }}
          path: report.html
          retention-days: 90
